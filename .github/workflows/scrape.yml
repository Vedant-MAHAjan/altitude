name: scrape-trek-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 1,13 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run scrapers
        run: npm run scrape
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          SCRAPE_CONCURRENCY: "2"
          SCRAPE_TOUR_LIMIT: "8"
          SCRAPE_NAV_TIMEOUT_MS: "45000"
          SCRAPE_LOG_LEVEL: "info"
          SCRAPE_USER_AGENT: ${{ secrets.SCRAPE_USER_AGENT }}

      - name: Commit refreshed static snapshots
        if: ${{ success() }}
        run: |
          if git diff --quiet -- public/snapshots; then
            echo "No snapshot changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/snapshots
          git commit -m "chore: refresh static catalog snapshots"
          git push